<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-icon">&#128274;</span>
      <h1>Admin CRM</h1>
      <p>Accede al panel de gestión</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }

      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="tu@email.com" required autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        @if (loading) { Accediendo... } @else { Iniciar Sesión }
      </button>
    </form>
  </div>
</div>
